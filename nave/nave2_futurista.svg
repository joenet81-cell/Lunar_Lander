<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <!-- Futuristic Sleek Lander -->

  <!-- Solar Panel Left -->
  <rect x="2" y="52" width="30" height="18" rx="2" fill="#1a3a6e" stroke="#4488ff" stroke-width="1.5"/>
  <!-- Solar cells grid -->
  <line x1="12" y1="52" x2="12" y2="70" stroke="#2255aa" stroke-width="1"/>
  <line x1="22" y1="52" x2="22" y2="70" stroke="#2255aa" stroke-width="1"/>
  <line x1="2"  y1="58" x2="32" y2="58" stroke="#2255aa" stroke-width="1"/>
  <line x1="2"  y1="64" x2="32" y2="64" stroke="#2255aa" stroke-width="1"/>
  <!-- Panel connector arm -->
  <rect x="32" y="58" width="10" height="4" rx="1" fill="#3366cc" stroke="#4488ff" stroke-width="1"/>

  <!-- Solar Panel Right -->
  <rect x="88" y="52" width="30" height="18" rx="2" fill="#1a3a6e" stroke="#4488ff" stroke-width="1.5"/>
  <line x1="98" y1="52" x2="98" y2="70" stroke="#2255aa" stroke-width="1"/>
  <line x1="108" y1="52" x2="108" y2="70" stroke="#2255aa" stroke-width="1"/>
  <line x1="88"  y1="58" x2="118" y2="58" stroke="#2255aa" stroke-width="1"/>
  <line x1="88"  y1="64" x2="118" y2="64" stroke="#2255aa" stroke-width="1"/>
  <rect x="78" y="58" width="10" height="4" rx="1" fill="#3366cc" stroke="#4488ff" stroke-width="1"/>

  <!-- Landing legs (retractable style) -->
  <!-- Left leg -->
  <line x1="44" y1="115" x2="22" y2="138" stroke="#336699" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="138" x2="36" y2="138" stroke="#336699" stroke-width="3" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="76" y1="115" x2="98" y2="138" stroke="#336699" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="98" y1="138" x2="84" y2="138" stroke="#336699" stroke-width="3" stroke-linecap="round"/>
  <!-- Foot pads -->
  <ellipse cx="29" cy="138" rx="10" ry="3.5" fill="#224466" stroke="#4488ff" stroke-width="1.5"/>
  <ellipse cx="91" cy="138" rx="10" ry="3.5" fill="#224466" stroke="#4488ff" stroke-width="1.5"/>

  <!-- Engine cluster (2 nozzles) -->
  <polygon points="48,116 56,116 54,132 50,132" fill="#223355" stroke="#4488ff" stroke-width="1.5"/>
  <polygon points="64,116 72,116 70,132 66,132" fill="#223355" stroke="#4488ff" stroke-width="1.5"/>
  <!-- Engine glow rings -->
  <ellipse cx="52" cy="116" rx="5" ry="2" fill="#00aaff" opacity="0.5"/>
  <ellipse cx="68" cy="116" rx="5" ry="2" fill="#00aaff" opacity="0.5"/>

  <!-- Main body — cylindrical teal -->
  <rect x="38" y="60" width="44" height="60" rx="8" fill="#0e6674" stroke="#00ccee" stroke-width="2"/>

  <!-- Body detail lines -->
  <line x1="38" y1="80" x2="82" y2="80" stroke="#00aacc" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="95" x2="82" y2="95" stroke="#00aacc" stroke-width="1" opacity="0.5"/>
  <line x1="38" y1="108" x2="82" y2="108" stroke="#00aacc" stroke-width="1" opacity="0.5"/>

  <!-- Viewport -->
  <ellipse cx="60" cy="73" rx="12" ry="10" fill="#001833" stroke="#00ccee" stroke-width="2"/>
  <ellipse cx="60" cy="73" rx="9" ry="7" fill="#003366"/>
  <ellipse cx="57" cy="70" rx="3" ry="2.5" fill="#0066cc" opacity="0.7"/>
  <!-- Viewport reflection -->
  <line x1="55" y1="67" x2="58" y2="64" stroke="white" stroke-width="1" opacity="0.4"/>

  <!-- Navigation lights -->
  <circle cx="39" cy="90" r="3" fill="#ff4444" stroke="#ff0000" stroke-width="1"/>
  <circle cx="81" cy="90" r="3" fill="#44ff44" stroke="#00cc00" stroke-width="1"/>

  <!-- Logo band -->
  <rect x="38" y="98" width="44" height="10" rx="2" fill="#0a4455" stroke="#00aacc" stroke-width="1"/>
  <text x="60" y="107" font-family="monospace" font-size="7" fill="#00ccee" text-anchor="middle">NEXUS-7</text>

  <!-- Nose cone -->
  <polygon points="38,60 82,60 76,38 44,38" fill="#0d5a68" stroke="#00ccee" stroke-width="2"/>
  <polygon points="44,38 76,38 70,22 50,22" fill="#0c5060" stroke="#00ccee" stroke-width="2"/>
  <polygon points="50,22 70,22 60,10" fill="#0a4450" stroke="#00ccee" stroke-width="2"/>

  <!-- Antenna top -->
  <line x1="60" y1="10" x2="60" y2="2" stroke="#00ccee" stroke-width="1.5"/>
  <circle cx="60" cy="2" r="2.5" fill="#00ffff" stroke="#00ccee" stroke-width="1"/>

  <!-- Side thrusters (RCS) -->
  <rect x="34" y="103" width="6" height="4" rx="1" fill="#0a4455" stroke="#00aacc" stroke-width="1"/>
  <rect x="80" y="103" width="6" height="4" rx="1" fill="#0a4455" stroke="#00aacc" stroke-width="1"/>
</svg>
