<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 145" width="130" height="145">
  <!-- Industrial Mining Ship — Plateado Cromado -->

  <!-- Left cargo pod -->
  <rect x="4" y="55" width="28" height="40" rx="3" fill="#7a7a7a" stroke="#cccccc" stroke-width="2"/>
  <rect x="7" y="58" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="7" y="70" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="7" y="82" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="32" y="68" width="12" height="6" rx="1" fill="#909090" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Right cargo pod -->
  <rect x="98" y="55" width="28" height="40" rx="3" fill="#7a7a7a" stroke="#cccccc" stroke-width="2"/>
  <rect x="101" y="58" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="101" y="70" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="101" y="82" width="22" height="8" rx="1" fill="#606060" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="86" y="68" width="12" height="6" rx="1" fill="#909090" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Landing legs -->
  <line x1="36" y1="112" x2="8"  y2="136" stroke="#909090" stroke-width="5" stroke-linecap="round"/>
  <rect x="2"  y="132" width="18" height="6" rx="2" fill="#707070" stroke="#cccccc" stroke-width="1.5"/>
  <line x1="48" y1="115" x2="30" y2="133" stroke="#b0b0b0" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="112" x2="122" y2="136" stroke="#909090" stroke-width="5" stroke-linecap="round"/>
  <rect x="110" y="132" width="18" height="6" rx="2" fill="#707070" stroke="#cccccc" stroke-width="1.5"/>
  <line x1="82" y1="115" x2="100" y2="133" stroke="#b0b0b0" stroke-width="4" stroke-linecap="round"/>

  <!-- Engine cluster -->
  <polygon points="38,114 52,114 50,132 40,132" fill="#444444" stroke="#dddddd" stroke-width="1.5"/>
  <polygon points="55,114 75,114 73,134 57,134" fill="#3a3a3a" stroke="#eeeeee" stroke-width="2"/>
  <polygon points="78,114 92,114 90,132 80,132" fill="#444444" stroke="#dddddd" stroke-width="1.5"/>
  <ellipse cx="45" cy="114" rx="8"  ry="3" fill="#dddddd" opacity="0.7"/>
  <ellipse cx="65" cy="114" rx="10" ry="3.5" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="85" cy="114" rx="8"  ry="3" fill="#dddddd" opacity="0.7"/>

  <!-- Main hull — plateado con reflejos -->
  <rect x="30" y="45" width="70" height="72" rx="5" fill="#888888" stroke="#dddddd" stroke-width="2.5"/>
  <!-- Franja clara central (reflejo) -->
  <rect x="46" y="45" width="20" height="72" fill="#b0b0b0" opacity="0.35"/>
  <!-- Sombra borde izquierdo -->
  <rect x="30" y="45" width="10" height="72" rx="3" fill="#555555" opacity="0.4"/>
  <!-- Sombra borde derecho -->
  <rect x="90" y="45" width="10" height="72" rx="3" fill="#444444" opacity="0.4"/>

  <rect x="30" y="45" width="34" height="36" rx="3" fill="#909090" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="66" y="45" width="34" height="36" rx="3" fill="#868686" stroke="#bbbbbb" stroke-width="1"/>
  <rect x="30" y="83" width="34" height="34" rx="3" fill="#848484" stroke="#aaaaaa" stroke-width="1"/>
  <rect x="66" y="83" width="34" height="34" rx="3" fill="#808080" stroke="#aaaaaa" stroke-width="1"/>

  <!-- Rivets — plateados muy brillantes -->
  <circle cx="35" cy="50"  r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="95" cy="50"  r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="35" cy="113" r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="95" cy="113" r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="35" cy="81"  r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="95" cy="81"  r="2.5" fill="#dddddd" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="65" cy="50"  r="2.5" fill="#eeeeee" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="65" cy="81"  r="2.5" fill="#eeeeee" stroke="#ffffff" stroke-width="0.5"/>
  <circle cx="65" cy="113" r="2.5" fill="#eeeeee" stroke="#ffffff" stroke-width="0.5"/>

  <!-- Cockpit window -->
  <rect x="46" y="50" width="38" height="26" rx="4" fill="#222222" stroke="#cccccc" stroke-width="2"/>
  <rect x="48" y="52" width="34" height="22" rx="3" fill="#0d1520" stroke="#667788" stroke-width="1.5"/>
  <rect x="50" y="54" width="14" height="18" rx="2" fill="#0f1a28" stroke="#445566" stroke-width="1"/>
  <rect x="66" y="54" width="14" height="18" rx="2" fill="#0f1a28" stroke="#445566" stroke-width="1"/>
  <line x1="52" y1="56" x2="56" y2="60" stroke="white" stroke-width="1.5" opacity="0.45"/>
  <line x1="68" y1="56" x2="72" y2="60" stroke="white" stroke-width="1.5" opacity="0.45"/>

  <!-- Warning stripes — plateado claro / gris medio -->
  <clipPath id="c6"><rect x="30" y="86" width="70" height="6"/></clipPath>
  <g clip-path="url(#c6)">
    <rect x="30" y="86" width="70" height="6" fill="#505050"/>
    <line x1="28" y1="86" x2="36" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="36" y1="86" x2="44" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="44" y1="86" x2="52" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="52" y1="86" x2="60" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="60" y1="86" x2="68" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="68" y1="86" x2="76" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="76" y1="86" x2="84" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="84" y1="86" x2="92" y2="92" stroke="#eeeeee" stroke-width="3"/>
    <line x1="92" y1="86" x2="100" y2="92" stroke="#eeeeee" stroke-width="3"/>
  </g>
  <rect x="30" y="86" width="70" height="6" fill="none" stroke="#aaaaaa" stroke-width="0.5"/>

  <!-- Side thrusters -->
  <rect x="27" y="95" width="6" height="10" rx="2" fill="#555555" stroke="#aaaaaa" stroke-width="1.5"/>
  <ellipse cx="30" cy="105" rx="3.5" ry="1.5" fill="#eeeeee" opacity="0.6"/>
  <rect x="97" y="95" width="6" height="10" rx="2" fill="#555555" stroke="#aaaaaa" stroke-width="1.5"/>
  <ellipse cx="100" cy="105" rx="3.5" ry="1.5" fill="#eeeeee" opacity="0.6"/>

  <!-- Top dome — cromado -->
  <ellipse cx="65" cy="45" rx="22" ry="8" fill="#aaaaaa" stroke="#dddddd" stroke-width="2"/>
  <ellipse cx="65" cy="45" rx="14" ry="5" fill="#888888" stroke="#bbbbbb" stroke-width="1"/>
  <!-- Reflejo cúpula -->
  <ellipse cx="59" cy="43" rx="7" ry="2.5" fill="#dddddd" opacity="0.5"/>

  <!-- Radar dish -->
  <line x1="65" y1="37" x2="65" y2="25" stroke="#aaaaaa" stroke-width="2"/>
  <ellipse cx="65" cy="24" rx="10" ry="4" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <line x1="55" y1="24" x2="75" y2="24" stroke="#cccccc" stroke-width="1"/>
  <circle cx="65" cy="24" r="2" fill="#eeeeee" stroke="#ffffff" stroke-width="0.5"/>

  <!-- Logo — rojo -->
  <rect x="42" y="98" width="46" height="12" rx="2" fill="#1a0d00" stroke="#cc5500" stroke-width="1.5"/>
  <text x="65" y="108" font-family="monospace" font-size="7" fill="#ff8800" text-anchor="middle" font-weight="bold">MINING CO.</text>
</svg>
