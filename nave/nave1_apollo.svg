<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Apollo Classic Lander -->

  <!-- Leg Left Back -->
  <line x1="38" y1="100" x2="10" y2="128" stroke="#b8860b" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="9" cy="130" rx="10" ry="4" fill="#8b6914" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Leg Right Back -->
  <line x1="82" y1="100" x2="110" y2="128" stroke="#b8860b" stroke-width="4" stroke-linecap="round"/>
  <ellipse cx="111" cy="130" rx="10" ry="4" fill="#8b6914" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Leg Left Front -->
  <line x1="42" y1="105" x2="20" y2="125" stroke="#daa520" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="18" cy="127" rx="8" ry="3" fill="#b8860b" stroke="#daa520" stroke-width="1"/>

  <!-- Leg Right Front -->
  <line x1="78" y1="105" x2="100" y2="125" stroke="#daa520" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="102" cy="127" rx="8" ry="3" fill="#b8860b" stroke="#daa520" stroke-width="1"/>

  <!-- Engine bell -->
  <polygon points="52,108 68,108 72,125 48,125" fill="#555" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="60" cy="125" rx="12" ry="4" fill="#333" stroke="#666" stroke-width="1"/>
  <!-- Engine glow -->
  <ellipse cx="60" cy="108" rx="10" ry="3" fill="#ff8800" opacity="0.6"/>

  <!-- Descent stage (lower body) -->
  <rect x="28" y="75" width="64" height="38" rx="4" fill="#c8a000" stroke="#daa520" stroke-width="2"/>
  <!-- Gold foil texture lines -->
  <line x1="28" y1="83" x2="92" y2="83" stroke="#a07800" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="91" x2="92" y2="91" stroke="#a07800" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="99" x2="92" y2="99" stroke="#a07800" stroke-width="1" opacity="0.6"/>
  <line x1="44" y1="75" x2="44" y2="113" stroke="#a07800" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="75" x2="60" y2="113" stroke="#a07800" stroke-width="1" opacity="0.6"/>
  <line x1="76" y1="75" x2="76" y2="113" stroke="#a07800" stroke-width="1" opacity="0.6"/>

  <!-- Ascent stage (upper body) -->
  <rect x="35" y="38" width="50" height="42" rx="6" fill="#e8e8e8" stroke="#aaa" stroke-width="2"/>

  <!-- Hatch/door -->
  <rect x="43" y="48" width="14" height="18" rx="2" fill="#ccc" stroke="#999" stroke-width="1.5"/>
  <line x1="50" y1="48" x2="50" y2="66" stroke="#aaa" stroke-width="1"/>

  <!-- Main window -->
  <ellipse cx="72" cy="57" rx="8" ry="7" fill="#88ccff" stroke="#aaa" stroke-width="1.5"/>
  <ellipse cx="70" cy="55" rx="3" ry="2.5" fill="white" opacity="0.5"/>

  <!-- Top docking ring -->
  <ellipse cx="60" cy="38" rx="18" ry="6" fill="#ccc" stroke="#aaa" stroke-width="2"/>
  <ellipse cx="60" cy="38" rx="10" ry="3.5" fill="#bbb" stroke="#999" stroke-width="1"/>

  <!-- Antenna -->
  <line x1="60" y1="32" x2="60" y2="12" stroke="#aaa" stroke-width="1.5"/>
  <circle cx="60" cy="11" r="3" fill="#ccc" stroke="#aaa" stroke-width="1"/>
  <line x1="55" y1="19" x2="65" y2="19" stroke="#aaa" stroke-width="1"/>

  <!-- RCS thrusters (small side jets) -->
  <rect x="33" y="50" width="5" height="8" rx="1" fill="#999" stroke="#777" stroke-width="1"/>
  <rect x="82" y="50" width="5" height="8" rx="1" fill="#999" stroke="#777" stroke-width="1"/>

  <!-- US Flag patch -->
  <rect x="55" y="63" width="12" height="8" fill="#002868"/>
  <rect x="55" y="63" width="12" height="3" fill="#BF0A30"/>
  <rect x="55" y="67" width="12" height="2" fill="white"/>
  <rect x="55" y="69" width="12" height="2" fill="#BF0A30"/>
</svg>
